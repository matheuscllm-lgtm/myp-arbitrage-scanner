name: Weekly MYP Scan

# v5.5 (2026-05-14): refator pra matrix job + aggregate.
# v5.7.2 (2026-05-15): bump default chunk_total 6→20.
#
# Problema anterior (v5.5 com chunk_total=6): full scan single-thread = ~7h,
# não cabia em GH Actions free tier (max 6h job). Matrix de 6 chunks ainda
# levava ~6h por chunk (348 editions / 6 = 58 editions/chunk × ~7min/edição
# interleaved). Run 25876052564 (2026-05-14) bateu timeout 120min em 4/6 chunks.
#
# Solução v5.7.2: matrix de 20 chunks paralelos via --chunk-index/--chunk-total
# interleaved slicing no scanner. Cada chunk processa ~17 editions em ~90min.
# Job final agrega via myp_aggregate.py em XLSX consolidado idêntico ao formato
# single-thread.

on:
  # 2026-05-15: cron schedule REMOVIDO — full scans pesados rodam LOCAL no PC
  # do operador (zero billing). Daily Quick Scan continua automático no GH.
  # Workflow permanece disparável manualmente via workflow_dispatch pra
  # emergências (ex: PC indisponível, scan urgente fora do laptop).
  workflow_dispatch:
    inputs:
      editions:
        description: 'Substrings de edições (separadas por espaço, em "")'
        required: false
        default: ''
      threshold:
        description: 'Margem BRUTA mínima em percent (default 30 = 30%)'
        required: false
        default: '30'
      min_price:
        description: 'Preço mínimo BRL (default 80)'
        required: false
        default: '80'
      delay:
        description: 'Delay entre requests em segundos (default 1.5)'
        required: false
        default: '1.5'
      chunk_total:
        description: 'Número de chunks paralelos (default 20; max 20)'
        required: false
        default: '20'

concurrency:
  group: myp-scan
  cancel-in-progress: false

# Public-repo posture: results are delivered as artifacts only (never committed
# to a public branch), so the workflow needs only read access to the repo.
permissions:
  contents: read

jobs:
  # ── compute matrix shape baseado em chunk_total ──
  plan:
    runs-on: ubuntu-latest
    outputs:
      chunk_indices: ${{ steps.plan.outputs.chunk_indices }}
      chunk_total: ${{ steps.plan.outputs.chunk_total }}
    steps:
      - name: Compute chunk indices
        id: plan
        run: |
          TOTAL="${{ github.event.inputs.chunk_total || '20' }}"
          # Cap defensivo: 1-20 chunks
          if [ "$TOTAL" -lt 1 ]; then TOTAL=1; fi
          if [ "$TOTAL" -gt 20 ]; then TOTAL=20; fi
          # JSON array de 0..TOTAL-1
          INDICES=$(python3 -c "import json; print(json.dumps(list(range($TOTAL))))")
          echo "chunk_indices=$INDICES" >> $GITHUB_OUTPUT
          echo "chunk_total=$TOTAL" >> $GITHUB_OUTPUT
          echo "Plan: $TOTAL chunks → $INDICES"

  scan:
    needs: plan
    runs-on: ubuntu-latest
    timeout-minutes: 240   # por chunk (4h). Folga p/ scan largo / Cloudflare lenta; teto GH é 6h/job
    strategy:
      fail-fast: false    # um chunk falhar não derruba os outros
      matrix:
        chunk_index: ${{ fromJSON(needs.plan.outputs.chunk_indices) }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python 3.14
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run scanner chunk ${{ matrix.chunk_index }}/${{ needs.plan.outputs.chunk_total }}
        env:
          PYTHONIOENCODING: utf-8
          # v5.11: preço TCG real. v5.15: a fonte do CI é o tcgcsv.com — os
          # runners do GitHub NÃO alcançam api.pokemontcg.io, mas ALCANÇAM o
          # tcgcsv (sonda run 27918333945). A key fica disponível mas é
          # irrelevante em --tcg-source tcgcsv (o tcgcsv não usa key).
          POKEMONTCG_API_KEY: ${{ secrets.POKEMONTCG_API_KEY }}
        run: |
          THRESHOLD="${{ github.event.inputs.threshold || '30' }}"
          MIN_PRICE="${{ github.event.inputs.min_price || '80' }}"
          DELAY="${{ github.event.inputs.delay || '1.5' }}"
          EDITIONS_INPUT='${{ github.event.inputs.editions }}'
          CI="${{ matrix.chunk_index }}"
          CT="${{ needs.plan.outputs.chunk_total }}"

          # Multi-palavra: `eval set --` re-parseia preservando as aspas, igual
          # ao quick-scan.yml (ex.: "Paldean Fates" vira 1 filtro, não "Paldean"
          # + "Fates" — bug do $ARGS cru anterior). Editions vazio = catálogo
          # full (não passa --editions; o scanner varre todas as edições).
          # v5.15: --tcg-source tcgcsv = preço TCG REAL no runner (a rota que
          # funciona); sem isto o weekly cairia 100% no fallback `.estat-tcg`.
          if [ -n "$EDITIONS_INPUT" ]; then
            eval "set -- $EDITIONS_INPUT"
            echo "Edições ($#): $@"
            python myp_arbitrage_scanner.py \
              --threshold "$THRESHOLD" --min-price "$MIN_PRICE" --delay "$DELAY" \
              --tcg-source tcgcsv \
              --chunk-index "$CI" --chunk-total "$CT" \
              --output "myp_chunk_${CI}.xlsx" \
              --editions "$@"
          else
            echo "Editions vazio → catálogo full"
            python myp_arbitrage_scanner.py \
              --threshold "$THRESHOLD" --min-price "$MIN_PRICE" --delay "$DELAY" \
              --tcg-source tcgcsv \
              --chunk-index "$CI" --chunk-total "$CT" \
              --output "myp_chunk_${CI}.xlsx"
          fi

      - name: Upload chunk artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: myp-chunk-${{ matrix.chunk_index }}
          include-hidden-files: true
          path: |
            myp_chunk_*.xlsx
            .debug/
          retention-days: 30
          if-no-files-found: warn

  aggregate:
    needs: scan
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Roda mesmo se algum chunk falhar — agrega o que tem
    if: always() && needs.scan.result != 'cancelled'

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python 3.14
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Download all chunk artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: myp-chunk-*
          merge-multiple: true
          path: chunks/

      - name: List downloaded chunks
        run: |
          echo "Chunks recebidos:"
          ls -la chunks/ || echo "(diretório vazio)"
          find chunks/ -name 'myp_chunk_*.xlsx' -ls

      - name: Aggregate chunks into consolidated XLSX
        env:
          PYTHONIOENCODING: utf-8
        run: |
          THRESHOLD="${{ github.event.inputs.threshold || '30' }}"
          # converter percent → fração pra generate_xlsx
          THRESHOLD_FRAC=$(python3 -c "print($THRESHOLD / 100)")
          OUT="myp_arbitrage_$(date -u +%Y%m%d_%H%M).xlsx"
          CHUNK_COUNT=$(find chunks/ -name 'myp_chunk_*.xlsx' | wc -l)
          if [ "$CHUNK_COUNT" -eq 0 ]; then
            echo "::error::Zero chunks recuperados — não há nada pra agregar"
            exit 1
          fi
          python myp_aggregate.py chunks/myp_chunk_*.xlsx \
            --output "$OUT" \
            --threshold "$THRESHOLD_FRAC"
          echo "Final XLSX: $OUT"

      # Public-repo posture: deal data is delivered as a run ARTIFACT only —
      # never committed to a public branch. Generate the markdown summary first,
      # then bundle it into the consolidated artifact below.
      - name: Generate markdown summary
        env:
          PYTHONIOENCODING: utf-8
        run: |
          XLSX=$(ls -t myp_arbitrage_*.xlsx 2>/dev/null | head -1)
          if [ -z "$XLSX" ]; then
            echo "::warning::Sem XLSX consolidado, pulando summary"
            exit 0
          fi
          DATE=$(date -u +%Y-%m-%d)
          mkdir -p results
          OUT="results/weekly-${DATE}.md"
          python myp_summary.py "$XLSX" \
            --output "$OUT" \
            --type weekly \
            --run-id "${{ github.run_id }}" \
            --repo "${{ github.repository }}"
          cp "$OUT" "results/latest-weekly.md"
          echo "Generated: $OUT + results/latest-weekly.md"

      - name: Upload consolidated artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: myp-scan-consolidated-${{ github.run_id }}
          path: |
            myp_arbitrage_*.xlsx
            results/weekly-*.md
            results/latest-weekly.md
          retention-days: 30
          if-no-files-found: warn
