name: Weekly MYP Scan

# v5.5 (2026-05-14): refator pra matrix job + aggregate.
# v5.7.2 (2026-05-15): bump default chunk_total 6→20.
#
# Problema anterior (v5.5 com chunk_total=6): full scan single-thread = ~7h,
# não cabia em GH Actions free tier (max 6h job). Matrix de 6 chunks ainda
# levava ~6h por chunk (348 editions / 6 = 58 editions/chunk × ~7min/edição
# interleaved). Run 25876052564 (2026-05-14) bateu timeout 120min em 4/6 chunks.
#
# Solução v5.7.2: matrix de 20 chunks paralelos via --chunk-index/--chunk-total
# interleaved slicing no scanner. Cada chunk processa ~17 editions em ~90min.
# Job final agrega via myp_aggregate.py em XLSX consolidado idêntico ao formato
# single-thread.

on:
  schedule:
    # 2026-05-15: monthly (dia 1 do mês às 12:00 UTC = 09:00 BRT). Bi-weekly
    # (1+15) consumia ~2400min/mês só no weekly e estourava free tier 2000min/mês
    # (incidente run 25898507612 onde aggregate job falhou por billing). Decisão
    # operador: monthly + scans ad-hoc rodam LOCAL (não consome GH Actions).
    # Daily Quick Scan a cada 2 dias mantido (~150min/mês).
    - cron: '0 12 1 * *'
  workflow_dispatch:
    inputs:
      editions:
        description: 'Substrings de edições (separadas por espaço, em "")'
        required: false
        default: ''
      threshold:
        description: 'Margem mínima em percent (default 25 = 25%)'
        required: false
        default: '25'
      min_price:
        description: 'Preço mínimo BRL (default 80)'
        required: false
        default: '80'
      delay:
        description: 'Delay entre requests em segundos (default 1.5)'
        required: false
        default: '1.5'
      chunk_total:
        description: 'Número de chunks paralelos (default 20; max 20)'
        required: false
        default: '20'

concurrency:
  group: myp-scan
  cancel-in-progress: false

# v5.6 (2026-05-14): aggregate job precisa committar markdown summary no repo
permissions:
  contents: write

jobs:
  # ── compute matrix shape baseado em chunk_total ──
  plan:
    runs-on: ubuntu-latest
    outputs:
      chunk_indices: ${{ steps.plan.outputs.chunk_indices }}
      chunk_total: ${{ steps.plan.outputs.chunk_total }}
    steps:
      - name: Compute chunk indices
        id: plan
        run: |
          TOTAL="${{ github.event.inputs.chunk_total || '20' }}"
          # Cap defensivo: 1-20 chunks
          if [ "$TOTAL" -lt 1 ]; then TOTAL=1; fi
          if [ "$TOTAL" -gt 20 ]; then TOTAL=20; fi
          # JSON array de 0..TOTAL-1
          INDICES=$(python3 -c "import json; print(json.dumps(list(range($TOTAL))))")
          echo "chunk_indices=$INDICES" >> $GITHUB_OUTPUT
          echo "chunk_total=$TOTAL" >> $GITHUB_OUTPUT
          echo "Plan: $TOTAL chunks → $INDICES"

  scan:
    needs: plan
    runs-on: ubuntu-latest
    timeout-minutes: 120   # por chunk; com 20 chunks de ~17 editions cada, ~30min sobra folga
    strategy:
      fail-fast: false    # um chunk falhar não derruba os outros
      matrix:
        chunk_index: ${{ fromJSON(needs.plan.outputs.chunk_indices) }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python 3.14
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run scanner chunk ${{ matrix.chunk_index }}/${{ needs.plan.outputs.chunk_total }}
        env:
          PYTHONIOENCODING: utf-8
        run: |
          THRESHOLD="${{ github.event.inputs.threshold || '25' }}"
          MIN_PRICE="${{ github.event.inputs.min_price || '80' }}"
          DELAY="${{ github.event.inputs.delay || '1.5' }}"
          EDITIONS_INPUT="${{ github.event.inputs.editions || '' }}"
          CI="${{ matrix.chunk_index }}"
          CT="${{ needs.plan.outputs.chunk_total }}"

          ARGS="--threshold $THRESHOLD --min-price $MIN_PRICE --delay $DELAY"
          ARGS="$ARGS --chunk-index $CI --chunk-total $CT"
          ARGS="$ARGS --output myp_chunk_${CI}.xlsx"
          [ -n "$EDITIONS_INPUT" ] && ARGS="$ARGS --editions $EDITIONS_INPUT"

          echo "Args: $ARGS"
          python myp_arbitrage_scanner.py $ARGS

      - name: Upload chunk artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: myp-chunk-${{ matrix.chunk_index }}
          include-hidden-files: true
          path: |
            myp_chunk_*.xlsx
            .debug/
          retention-days: 30
          if-no-files-found: warn

  aggregate:
    needs: scan
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Roda mesmo se algum chunk falhar — agrega o que tem
    if: always() && needs.scan.result != 'cancelled'

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python 3.14
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Download all chunk artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: myp-chunk-*
          merge-multiple: true
          path: chunks/

      - name: List downloaded chunks
        run: |
          echo "Chunks recebidos:"
          ls -la chunks/ || echo "(diretório vazio)"
          find chunks/ -name 'myp_chunk_*.xlsx' -ls

      - name: Aggregate chunks into consolidated XLSX
        env:
          PYTHONIOENCODING: utf-8
        run: |
          THRESHOLD="${{ github.event.inputs.threshold || '25' }}"
          # converter percent → fração pra generate_xlsx
          THRESHOLD_FRAC=$(python3 -c "print($THRESHOLD / 100)")
          OUT="myp_arbitrage_$(date -u +%Y%m%d_%H%M).xlsx"
          CHUNK_COUNT=$(find chunks/ -name 'myp_chunk_*.xlsx' | wc -l)
          if [ "$CHUNK_COUNT" -eq 0 ]; then
            echo "::error::Zero chunks recuperados — não há nada pra agregar"
            exit 1
          fi
          python myp_aggregate.py chunks/myp_chunk_*.xlsx \
            --output "$OUT" \
            --threshold "$THRESHOLD_FRAC"
          echo "Final XLSX: $OUT"

      - name: Upload consolidated artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: myp-scan-consolidated-${{ github.run_id }}
          path: |
            myp_arbitrage_*.xlsx
          retention-days: 30
          if-no-files-found: warn

      # v5.6: gera markdown summary pra ficar visível no repo (sem precisar
      # baixar artifact). Cada scan vira results/weekly-DATE.md + atualiza
      # results/latest-weekly.md como ponteiro pro último.
      - name: Generate markdown summary
        env:
          PYTHONIOENCODING: utf-8
        run: |
          XLSX=$(ls -t myp_arbitrage_*.xlsx 2>/dev/null | head -1)
          if [ -z "$XLSX" ]; then
            echo "::warning::Sem XLSX consolidado, pulando summary"
            exit 0
          fi
          DATE=$(date -u +%Y-%m-%d)
          mkdir -p results
          OUT="results/weekly-${DATE}.md"
          python myp_summary.py "$XLSX" \
            --output "$OUT" \
            --type weekly \
            --run-id "${{ github.run_id }}" \
            --repo "${{ github.repository }}"
          # Pointer pro último (operador abre só esse no Obsidian)
          cp "$OUT" "results/latest-weekly.md"
          echo "Generated: $OUT + results/latest-weekly.md"

      - name: Commit markdown to repo
        run: |
          if [ ! -f "results/latest-weekly.md" ]; then
            echo "Sem markdown gerado, pulando commit"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add results/
          if git diff --cached --quiet; then
            echo "Nada novo pra commitar"
            exit 0
          fi
          git commit -m "results: weekly scan $(date -u +%Y-%m-%d) [skip ci]"
          git push
          echo "Pushed markdown summary to main"
